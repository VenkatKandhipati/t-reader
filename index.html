<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>తెలుగు కథలు — Telugu Reading Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;700&family=Noto+Serif+Telugu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --story-font-size: 1.25rem;
    }

    body {
      background: #e8e4dd;
      color: #2c2c2c;
      min-height: 100vh;
      font-family: 'Noto Serif Telugu', 'Noto Sans Telugu', Georgia, serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress Bar ────────────────────────────────────────── */

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: #b5531a;
      width: 0%;
      z-index: 20;
      transition: width 0.1s linear;
    }

    /* ── Top Nav Bar ─────────────────────────────────────────── */

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #d6d2cb;
      border-bottom: 1px solid #c4bfb6;
      padding: 0.6rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
    }

    .nav-left:hover { color: #333; }

    .nav-left svg {
      width: 18px;
      height: 18px;
    }

    .nav-title {
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #444;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #666;
      padding: 0.3rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .nav-btn:hover { color: #333; }

    .nav-btn svg {
      width: 20px;
      height: 20px;
    }

    .font-size-btn {
      background: none;
      border: 1px solid #b5b0a6;
      border-radius: 4px;
      cursor: pointer;
      color: #666;
      padding: 0.15rem 0.45rem;
      font-family: Georgia, serif;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .font-size-btn:hover {
      color: #333;
      background: rgba(0,0,0,0.05);
    }

    /* ── Page Content ────────────────────────────────────────── */

    .page-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 2rem 1.5rem 1rem;
    }

    .page {
      background: #f5f0e6;
      border-radius: 4px;
      box-shadow:
        0 1px 4px rgba(0,0,0,0.06),
        0 0 0 1px rgba(0,0,0,0.03);
      max-width: 800px;
      width: 100%;
      padding: 3rem 3.5rem 3rem;
      position: relative;
    }

    /* ── Chapter Headings ────────────────────────────────────── */

    .chapter-heading {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .chapter-heading .part {
      font-family: 'Noto Serif Telugu', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #3a2a10;
      margin-bottom: 0.3rem;
    }

    .chapter-heading .part-en {
      font-family: Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 400;
      color: #6b5a3e;
      margin-bottom: 0.3rem;
    }

    .chapter-heading .chapter {
      font-family: 'Noto Serif Telugu', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: #6b5a3e;
    }

    /* ── Daily Badge ─────────────────────────────────────────── */

    .daily-badge {
      display: inline-block;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.7rem;
      font-style: normal;
      background: #c8a96e;
      color: #fff;
      border-radius: 10px;
      padding: 0.15rem 0.55rem;
      margin-top: 0.5rem;
      letter-spacing: 0.03em;
    }

    .daily-badge.hidden { display: none; }

    /* ── Story Text ──────────────────────────────────────────── */

    .story {
      font-family: 'Noto Serif Telugu', 'Noto Sans Telugu', serif;
      font-size: var(--story-font-size);
      line-height: 2.6;
      color: #2a2a2a;
      text-align: left;
    }

    .story p { margin-bottom: 1.8rem; }
    .story p:last-child { margin-bottom: 0; }

    /* ── Clickable Words ─────────────────────────────────────── */

    .word {
      position: relative;
      display: inline;
      cursor: pointer;
      border-radius: 3px;
      transition: background-color 0.12s ease;
    }

    .word:hover { background-color: rgba(150, 100, 10, 0.1); }

    .word.active { background-color: rgba(150, 100, 10, 0.13); }

    .phonetic {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-family: Georgia, 'Times New Roman', serif;
      color: #8a6000;
      white-space: nowrap;
      pointer-events: none;
      line-height: 1;
      padding-bottom: 2px;
      letter-spacing: 0.02em;
    }

    .phonetic.hidden { display: none; }

    /* ── Bottom Bar ──────────────────────────────────────────── */

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #d6d2cb;
      border-top: 1px solid #c4bfb6;
      padding: 0.5rem 1.2rem;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.8rem;
      color: #666;
    }

    .bottom-bar button {
      background: none;
      border: 1px solid #b5b0a6;
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.8rem;
      color: #555;
      transition: background 0.15s, opacity 0.15s;
    }

    .bottom-bar button:hover { background: rgba(0,0,0,0.05); }

    .bottom-bar button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .bottom-bar button:disabled:hover { background: none; }

    .page-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .story-counter {
      font-size: 0.8rem;
      color: #666;
    }

    .word-count {
      color: #999;
      font-size: 0.72rem;
    }

    /* ── Hint Banner ─────────────────────────────────────────── */

    .hint {
      text-align: center;
      font-size: 0.78rem;
      color: #b0a48a;
      font-style: italic;
      font-family: Georgia, serif;
      padding: 0.5rem 0 0;
      margin-top: 2rem;
      border-top: 1px solid #e2d9c8;
    }

    /* ── Responsive ──────────────────────────────────────────── */

    @media (max-width: 640px) {
      .page {
        padding: 2rem 1.5rem;
        border-radius: 0;
      }

      .page-wrapper { padding: 1rem 0; }

      .story {
        font-size: var(--story-font-size);
        line-height: 2.4;
      }

      .chapter-heading .part { font-size: 1.3rem; }
      .chapter-heading .chapter { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Top Navigation -->
  <nav class="navbar">
    <a class="nav-left" href="library.html" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>పుస్తకాలు</span>
    </a>
    <div class="nav-title">తెలుగు కథలు</div>
    <div class="nav-right">
      <button class="font-size-btn" id="fontDecBtn" title="Decrease font size">A−</button>
      <button class="font-size-btn" id="fontIncBtn" title="Increase font size">A+</button>
      <button class="nav-btn" id="toggleAllBtn" title="Show/hide all transliterations">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-wrapper">
    <div class="page">
      <div class="chapter-heading">
        <div class="part" id="storyTitle"></div>
        <div class="part-en" id="storyTitleEn"></div>
        <div class="chapter" id="storyCollection"></div>
        <span class="daily-badge hidden" id="dailyBadge">నేటి కథ · Today's Story</span>
      </div>
      <div id="story" class="story"></div>
      <div class="hint">పదాన్ని నొక్కితే ఉచ్చారణ కనిపిస్తుంది &middot; Click a word to see its pronunciation</div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button id="prevBtn">← వెనుక</button>
    <div class="page-info">
      <span id="storyCounter" class="story-counter"></span>
      <span id="wordCount" class="word-count"></span>
    </div>
    <button id="nextBtn">తరువాత →</button>
  </div>

  <script src="stories.js"></script>
  <script>
    // ── Daily Story Selection ────────────────────────────────────────────────

    function getDailyStoryIndex() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / 86400000);
      return dayOfYear % STORIES.length;
    }

    // ── Transliteration ──────────────────────────────────────────────────────

    const INDEPENDENT_VOWELS = {
      'అ': 'a',  'ఆ': 'ā',  'ఇ': 'i',  'ఈ': 'ī',  'ఉ': 'u',  'ఊ': 'ū',
      'ఋ': 'ru', 'ౠ': 'rū', 'ఎ': 'e',  'ఏ': 'ē',  'ఐ': 'ai',
      'ఒ': 'o',  'ఓ': 'ō',  'ఔ': 'au'
    };

    const MATRAS = {
      'ా': 'ā',  'ి': 'i',  'ీ': 'ī',  'ు': 'u',  'ూ': 'ū',
      'ృ': 'ru', '\u0C44': 'rū',
      'ె': 'e',  'ే': 'ē',  'ై': 'ai', 'ొ': 'o',  'ో': 'ō',  'ౌ': 'au'
    };

    const CONSONANTS = {
      'క': 'k',   'ఖ': 'kh',  'గ': 'g',   'ఘ': 'gh',  'ఙ': 'ṅ',
      'చ': 'c',   'ఛ': 'ch',  'జ': 'j',   'ఝ': 'jh',  'ఞ': 'ñ',
      'ట': 'ṭ',   'ఠ': 'ṭh', 'డ': 'ḍ',   'ఢ': 'ḍh', 'ణ': 'ṇ',
      'త': 't',   'థ': 'th',  'ద': 'd',   'ధ': 'dh',  'న': 'n',
      'ప': 'p',   'ఫ': 'ph',  'బ': 'b',   'భ': 'bh',  'మ': 'm',
      'య': 'y',   'ర': 'r',   'ల': 'l',   'వ': 'v',
      'శ': 'ś',   'ష': 'ṣ',   'స': 's',   'హ': 'h',
      'ళ': 'ḷ',   'ఱ': 'rr'
    };

    const VELAR_SET     = new Set(['\u0C15','\u0C16','\u0C17','\u0C18','\u0C19']);
    const PALATAL_SET   = new Set(['\u0C1A','\u0C1B','\u0C1C','\u0C1D','\u0C1E']);
    const RETROFLEX_SET = new Set(['\u0C1F','\u0C20','\u0C21','\u0C22','\u0C23','\u0C33','\u0C31']);
    const LABIAL_SET    = new Set(['\u0C2A','\u0C2B','\u0C2C','\u0C2D','\u0C2E']);

    const DIGITS = {
      '౦': '0', '౧': '1', '౨': '2', '౩': '3', '౪': '4',
      '౫': '5', '౬': '6', '౭': '7', '౮': '8', '౯': '9'
    };

    const VIRAMA   = '\u0C4D';
    const ANUSVARA = '\u0C02';
    const VISARGA  = '\u0C03';

    function transliterate(text) {
      let result = '';
      let i = 0;
      const n = text.length;

      while (i < n) {
        const ch = text[i];

        if (ch === 'క' && text[i + 1] === VIRAMA && text[i + 2] === 'ష') {
          i += 3;
          if (MATRAS[text[i]] !== undefined) {
            result += 'kṣ' + MATRAS[text[i++]];
          } else if (text[i] === VIRAMA) {
            result += 'kṣ'; i++;
          } else {
            result += 'kṣa';
          }
          continue;
        }

        if (CONSONANTS[ch] !== undefined) {
          const base = CONSONANTS[ch];
          i++;
          if (MATRAS[text[i]] !== undefined) {
            result += base + MATRAS[text[i++]];
          } else if (text[i] === VIRAMA) {
            result += base; i++;
          } else {
            result += base + 'a';
          }
        } else if (INDEPENDENT_VOWELS[ch] !== undefined) {
          result += INDEPENDENT_VOWELS[ch];
          i++;
        } else if (ch === ANUSVARA) {
          const next = text[i + 1];
          if      (next && RETROFLEX_SET.has(next)) result += 'ṇ';
          else if (next && PALATAL_SET.has(next))   result += 'ñ';
          else if (next && VELAR_SET.has(next))     result += 'ṅ';
          else if (next && LABIAL_SET.has(next))    result += 'm';
          else if (next && CONSONANTS[next] !== undefined) result += 'n';
          else                                      result += 'ṁ';
          i++;
        } else if (ch === VISARGA) {
          result += 'ḥ';
          i++;
        } else if (DIGITS[ch] !== undefined) {
          result += DIGITS[ch];
          i++;
        } else {
          result += ch;
          i++;
        }
      }

      return result;
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    let allRevealed = false;
    let currentIndex = getDailyStoryIndex();
    const dailyIndex = currentIndex;

    function togglePhonetic(span) {
      const ph = span.querySelector('.phonetic');
      ph.classList.toggle('hidden');
      span.classList.toggle('active', !ph.classList.contains('hidden'));
    }

    function renderParagraph(text, container) {
      const tokens = text.match(/[\u0C00-\u0C7F]+|[^\u0C00-\u0C7F]+/g) || [];

      for (const token of tokens) {
        if (/[\u0C00-\u0C7F]/.test(token)) {
          const span = document.createElement('span');
          span.className = 'word';
          span.addEventListener('click', () => togglePhonetic(span));

          const label = document.createElement('span');
          label.className = 'phonetic hidden';
          label.textContent = transliterate(token);
          span.appendChild(label);
          span.appendChild(document.createTextNode(token));
          container.appendChild(span);
        } else {
          container.appendChild(document.createTextNode(token));
        }
      }
    }

    function loadStory(index) {
      const story = STORIES[index];
      currentIndex = index;
      allRevealed = false;

      // Update headings
      document.getElementById('storyTitle').textContent = story.title;
      document.getElementById('storyTitleEn').textContent = story.titleEn;
      document.getElementById('storyCollection').textContent = story.collection;
      document.getElementById('dailyBadge').classList.toggle('hidden', index !== dailyIndex);

      // Clear and re-render story
      const storyEl = document.getElementById('story');
      storyEl.innerHTML = '';

      let wordCount = 0;
      for (const para of story.text.split('\n\n')) {
        const p = document.createElement('p');
        renderParagraph(para, p);
        storyEl.appendChild(p);
        const teluguWords = para.match(/[\u0C00-\u0C7F]+/g);
        if (teluguWords) wordCount += teluguWords.length;
      }

      // Update bottom bar
      document.getElementById('wordCount').textContent = wordCount + ' పదాలు';
      document.getElementById('storyCounter').textContent = (index + 1) + ' / ' + STORIES.length;
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === STORIES.length - 1;

      // Scroll to top of page
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Event Listeners ──────────────────────────────────────────────────────

    document.getElementById('toggleAllBtn').addEventListener('click', () => {
      allRevealed = !allRevealed;
      document.querySelectorAll('.phonetic').forEach(ph => {
        ph.classList.toggle('hidden', !allRevealed);
      });
      document.querySelectorAll('.word').forEach(w => {
        w.classList.toggle('active', allRevealed);
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentIndex > 0) loadStory(currentIndex - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentIndex < STORIES.length - 1) loadStory(currentIndex + 1);
    });

    // ── Font Size Controls ─────────────────────────────────────────────────

    const FONT_MIN = 0.9;
    const FONT_MAX = 2.0;
    const FONT_STEP = 0.1;
    const FONT_DEFAULT = 1.25;

    function getStoredFontSize() {
      const stored = parseFloat(localStorage.getItem('storyFontSize'));
      return (stored >= FONT_MIN && stored <= FONT_MAX) ? stored : FONT_DEFAULT;
    }

    function applyFontSize(size) {
      document.documentElement.style.setProperty('--story-font-size', size + 'rem');
      localStorage.setItem('storyFontSize', size);
    }

    let currentFontSize = getStoredFontSize();
    applyFontSize(currentFontSize);

    document.getElementById('fontDecBtn').addEventListener('click', () => {
      currentFontSize = Math.max(FONT_MIN, +(currentFontSize - FONT_STEP).toFixed(2));
      applyFontSize(currentFontSize);
    });

    document.getElementById('fontIncBtn').addEventListener('click', () => {
      currentFontSize = Math.min(FONT_MAX, +(currentFontSize + FONT_STEP).toFixed(2));
      applyFontSize(currentFontSize);
    });

    // ── Story Progress Bar ──────────────────────────────────────────────────

    const progressBar = document.getElementById('progressBar');

    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? Math.min(100, (scrollTop / docHeight) * 100) : 0;
      progressBar.style.width = progress + '%';
    }

    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress, { passive: true });

    // ── Init ─────────────────────────────────────────────────────────────────

    const urlParams = new URLSearchParams(window.location.search);
    const storyParam = urlParams.get('story');
    if (storyParam !== null) {
      const idx = parseInt(storyParam, 10);
      if (idx >= 0 && idx < STORIES.length) currentIndex = idx;
    }

    loadStory(currentIndex);
    updateProgress();
  </script>
</body>
</html>
