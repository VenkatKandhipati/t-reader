<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>తెలుగు కథలు — Telugu Reading Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;500;700&family=Noto+Serif+Telugu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --story-font-size: 1.25rem;
      --bg: #e8e4dd;
      --page-bg: #f5f0e6;
      --navbar-bg: #d6d2cb;
      --navbar-border: #c4bfb6;
      --text-primary: #2c2c2c;
      --text-secondary: #555;
      --text-tertiary: #666;
      --text-muted: #888;
      --text-faint: #999;
      --text-heading: #3a2a10;
      --text-subheading: #6b5a3e;
      --text-hint: #b0a48a;
      --accent: #b5531a;
      --accent-gold: #c8a96e;
      --accent-green: #6b8f3a;
      --phonetic-color: #8a6000;
      --meaning-color: #1a6b3a;
      --meaning-bg: rgba(26, 107, 58, 0.08);
      --stats-label: #8a7a5a;
      --stats-border: #e2d9c8;
      --stats-section-border: #ece6d8;
      --ring-bg: #e2d9c8;
      --word-hover: rgba(150, 100, 10, 0.1);
      --word-active: rgba(150, 100, 10, 0.13);
      --word-clicked-border: #c8a96e;
      --btn-border: #b5b0a6;
      --btn-hover-bg: rgba(0, 0, 0, 0.05);
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --page-bg: #252525;
      --navbar-bg: #2a2a2a;
      --navbar-border: #3a3a3a;
      --text-primary: #e0ddd6;
      --text-secondary: #b0ada6;
      --text-tertiary: #999;
      --text-muted: #777;
      --text-faint: #666;
      --text-heading: #e8dcc8;
      --text-subheading: #c4a878;
      --text-hint: #706858;
      --accent: #d4743a;
      --accent-gold: #d4b478;
      --accent-green: #8ab450;
      --phonetic-color: #d4a830;
      --meaning-color: #4ab870;
      --meaning-bg: rgba(74, 184, 112, 0.1);
      --stats-label: #b0a080;
      --stats-border: #3a3530;
      --stats-section-border: #353025;
      --ring-bg: #3a3530;
      --word-hover: rgba(200, 169, 110, 0.15);
      --word-active: rgba(200, 169, 110, 0.2);
      --word-clicked-border: #8a7a50;
      --btn-border: #555;
      --btn-hover-bg: rgba(255, 255, 255, 0.06);
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      font-family: 'Noto Serif Telugu', 'Noto Sans Telugu', Georgia, serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Progress Bar ────────────────────────────────────────── */

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      width: 0%;
      z-index: 20;
      transition: width 0.1s linear;
    }

    /* ── Top Nav Bar ─────────────────────────────────────────── */

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--navbar-bg);
      border-bottom: 1px solid var(--navbar-border);
      padding: 0.6rem 1.2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .nav-left:hover { color: var(--text-primary); }

    .nav-left svg {
      width: 18px;
      height: 18px;
    }

    .nav-title {
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 0.3rem;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }

    .nav-btn:hover { color: var(--text-primary); }

    .nav-btn svg {
      width: 20px;
      height: 20px;
    }

    .font-size-btn {
      background: none;
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 0.15rem 0.45rem;
      font-family: Georgia, serif;
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .font-size-btn:hover {
      color: var(--text-primary);
      background: var(--btn-hover-bg);
    }

    /* ── Page Content ────────────────────────────────────────── */

    .page-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 1.2rem;
      padding: 2rem 1.5rem 1rem;
    }

    .page {
      background: var(--page-bg);
      border-radius: 4px;
      box-shadow:
        0 1px 4px rgba(0,0,0,0.06),
        0 0 0 1px rgba(0,0,0,0.03);
      max-width: 800px;
      width: 100%;
      padding: 3rem 3.5rem 3rem;
      position: relative;
    }

    /* ── Stats Panel ─────────────────────────────────────────── */

    .stats-panel {
      background: var(--page-bg);
      border-radius: 4px;
      box-shadow:
        0 1px 4px rgba(0,0,0,0.06),
        0 0 0 1px rgba(0,0,0,0.03);
      width: 240px;
      flex-shrink: 0;
      padding: 1.4rem 1.2rem;
      font-family: 'Noto Sans Telugu', sans-serif;
      position: sticky;
      top: 60px;
      display: none;
    }

    .stats-panel.visible { display: block; }

    .stats-heading {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--stats-border);
    }

    .proficiency-ring {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.2rem;
    }

    .proficiency-ring svg {
      width: 100px;
      height: 100px;
    }

    .proficiency-ring .ring-bg {
      fill: none;
      stroke: var(--ring-bg);
      stroke-width: 8;
    }

    .proficiency-ring .ring-fill {
      fill: none;
      stroke: var(--accent-green);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease;
    }

    .ring-fill.ring-high { stroke: var(--accent-green); }
    .ring-fill.ring-mid  { stroke: var(--accent-gold); }
    .ring-fill.ring-low  { stroke: var(--accent); }

    .proficiency-pct {
      font-family: Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-top: -66px;
      margin-bottom: 40px;
    }

    .proficiency-label {
      font-size: 0.7rem;
      color: var(--stats-label);
      margin-top: 0.2rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      font-size: 0.78rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--stats-section-border);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-label { color: var(--text-subheading); }

    .stat-value {
      font-family: Georgia, serif;
      font-weight: 600;
      color: var(--text-heading);
    }

    .stats-section-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--stats-label);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }

    .top-word {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0;
      font-size: 0.78rem;
      border-bottom: 1px solid var(--stats-section-border);
    }

    .top-word:last-child { border-bottom: none; }

    .top-word-text {
      font-family: 'Noto Serif Telugu', serif;
      color: var(--text-primary);
    }

    .top-word-phonetic {
      font-family: Georgia, serif;
      font-size: 0.65rem;
      color: var(--phonetic-color);
      margin-left: 0.3rem;
    }

    .top-word-count {
      font-family: Georgia, serif;
      font-size: 0.7rem;
      color: var(--text-faint);
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .stats-empty {
      font-size: 0.75rem;
      color: var(--text-hint);
      font-style: italic;
      font-family: Georgia, serif;
      text-align: center;
      padding: 0.5rem 0;
    }

    .stats-reset {
      display: block;
      width: 100%;
      margin-top: 1rem;
      padding: 0.35rem 0;
      background: none;
      border: 1px solid var(--navbar-border);
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.72rem;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
    }

    .stats-reset:hover {
      background: var(--btn-hover-bg);
      color: var(--text-secondary);
    }

    .word.was-clicked {
      border-bottom: 1px dotted var(--word-clicked-border);
    }

    /* ── Chapter Headings ────────────────────────────────────── */

    .chapter-heading {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .chapter-heading .part {
      font-family: 'Noto Serif Telugu', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 0.3rem;
    }

    .chapter-heading .part-en {
      font-family: Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 400;
      color: var(--text-subheading);
      margin-bottom: 0.3rem;
    }

    .chapter-heading .chapter {
      font-family: 'Noto Serif Telugu', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text-subheading);
    }

    /* ── Daily Badge ─────────────────────────────────────────── */

    .daily-badge {
      display: inline-block;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.7rem;
      font-style: normal;
      background: var(--accent-gold);
      color: #fff;
      border-radius: 10px;
      padding: 0.15rem 0.55rem;
      margin-top: 0.5rem;
      letter-spacing: 0.03em;
    }

    .daily-badge.hidden { display: none; }

    /* ── Story Text ──────────────────────────────────────────── */

    .story {
      font-family: 'Noto Serif Telugu', 'Noto Sans Telugu', serif;
      font-size: var(--story-font-size);
      line-height: 2.6;
      color: var(--text-primary);
      text-align: left;
    }

    .story p { margin-bottom: 1.8rem; }
    .story p:last-child { margin-bottom: 0; }

    /* ── Clickable Words ─────────────────────────────────────── */

    .word {
      position: relative;
      display: inline;
      cursor: pointer;
      border-radius: 3px;
      transition: background-color 0.12s ease;
    }

    .word:hover { background-color: var(--word-hover); }

    .word.active { background-color: var(--word-active); }

    .phonetic {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.52em;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--phonetic-color);
      white-space: nowrap;
      pointer-events: none;
      line-height: 1;
      padding-bottom: 2px;
      letter-spacing: 0.02em;
    }

    .phonetic.hidden { display: none; }

    .meaning {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.52em;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--meaning-color);
      background: var(--meaning-bg);
      white-space: nowrap;
      pointer-events: none;
      line-height: 1;
      padding: 1px 4px 2px;
      border-radius: 3px;
      letter-spacing: 0.02em;
    }

    .meaning.hidden { display: none; }

    /* ── Bottom Bar ──────────────────────────────────────────── */

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--navbar-bg);
      border-top: 1px solid var(--navbar-border);
      padding: 0.5rem 1.2rem;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    .bottom-bar button {
      background: none;
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-family: 'Noto Sans Telugu', sans-serif;
      font-size: 0.8rem;
      color: var(--text-secondary);
      transition: background 0.15s, opacity 0.15s;
    }

    .bottom-bar button:hover { background: var(--btn-hover-bg); }

    .bottom-bar button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .bottom-bar button:disabled:hover { background: none; }

    .page-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .story-counter {
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    .word-count {
      color: var(--text-faint);
      font-size: 0.72rem;
    }

    /* ── Hint Banner ─────────────────────────────────────────── */

    .hint {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-hint);
      font-style: italic;
      font-family: Georgia, serif;
      padding: 0.5rem 0 0;
      margin-top: 2rem;
      border-top: 1px solid var(--stats-border);
    }

    /* ── Flashcard Nav Link ──────────────────────────────────── */

    .nav-flashcard {
      position: relative;
      display: flex;
      align-items: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 0.3rem;
      border-radius: 4px;
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-flashcard:hover { color: var(--text-primary); }
    .nav-flashcard svg { width: 20px; height: 20px; }

    .nav-flashcard-badge {
      position: absolute;
      top: -3px;
      right: -5px;
      background: var(--accent);
      color: #fff;
      font-size: 0.55rem;
      font-family: Georgia, serif;
      padding: 1px 4px;
      border-radius: 6px;
      line-height: 1.5;
      pointer-events: none;
    }

    /* ── Theme Toggle ────────────────────────────────────────── */

    .theme-toggle {
      background: none;
      border: 1px solid var(--btn-border);
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 0.2rem 0.4rem;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }

    .theme-toggle:hover {
      color: var(--text-primary);
      background: var(--btn-hover-bg);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* ── Responsive ──────────────────────────────────────────── */

    @media (max-width: 900px) {
      .page-wrapper {
        flex-direction: column;
        align-items: center;
      }

      .stats-panel {
        width: 100%;
        max-width: 800px;
        position: static;
        order: -1;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 1.5rem 1rem;
        border-radius: 0;
      }

      .page-wrapper { padding: 0.5rem 0; }

      .story { line-height: 2.2; }

      .chapter-heading .part { font-size: 1.3rem; }
      .chapter-heading .chapter { font-size: 1rem; }

      .stats-panel { border-radius: 0; }

      /* Larger tap targets for prev/next */
      .bottom-bar button {
        padding: 0.55rem 1.2rem;
        font-size: 0.85rem;
        min-height: 44px;
      }

      /* Tighter navbar on small screens */
      .nav-right { gap: 0.4rem; }

      /* Prevent 300ms tap delay on interactive elements */
      .word, .bottom-bar button, .nav-btn, .font-size-btn, .theme-toggle {
        touch-action: manipulation;
      }
    }
  </style>
  <script>(function(){ var t=localStorage.getItem('theme'); if(t) document.documentElement.dataset.theme=t; })();</script>
</head>
<body>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Top Navigation -->
  <nav class="navbar">
    <a class="nav-left" href="library.html" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>పుస్తకాలు</span>
    </a>
    <div class="nav-title">తెలుగు కథలు</div>
    <div class="nav-right">
      <span id="authSlot"></span>
      <a class="nav-flashcard" href="flashcard.html" title="Flash cards">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="7" y1="15" x2="17" y2="15"/></svg>
        <span class="nav-flashcard-badge" id="navFlashcardBadge" style="display:none;"></span>
      </a>
      <button class="theme-toggle" id="themeToggleBtn" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="font-size-btn" id="fontDecBtn" title="Decrease font size">A−</button>
      <button class="font-size-btn" id="fontIncBtn" title="Increase font size">A+</button>
      <button class="nav-btn" id="toggleAllBtn" title="Show/hide all transliterations">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="nav-btn" id="toggleStatsBtn" title="Reading statistics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
      </button>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="page-wrapper">
    <div class="page">
      <div class="chapter-heading">
        <div class="part" id="storyTitle"></div>
        <div class="part-en" id="storyTitleEn"></div>
        <div class="chapter" id="storyCollection"></div>
        <span class="daily-badge hidden" id="dailyBadge">నేటి కథ · Today's Story</span>
      </div>
      <div id="story" class="story"></div>
      <div class="hint">పదాన్ని నొక్కితే ఉచ్చారణ కనిపిస్తుంది &middot; Click a word to see its pronunciation</div>
    </div>
    <div class="stats-panel" id="statsPanel">
      <div class="stats-heading">Reading Stats</div>
      <div class="proficiency-ring">
        <svg viewBox="0 0 40 40">
          <circle class="ring-bg" cx="20" cy="20" r="16" />
          <circle class="ring-fill" id="proficiencyRing" cx="20" cy="20" r="16"
            stroke-dasharray="100.53"
            stroke-dashoffset="100.53"
            transform="rotate(-90 20 20)" />
        </svg>
        <span class="proficiency-pct" id="proficiencyPct">100%</span>
        <span class="proficiency-label">read without help</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total words</span>
        <span class="stat-value" id="statTotal">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Words checked</span>
        <span class="stat-value" id="statChecked">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Total clicks</span>
        <span class="stat-value" id="statClicks">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Known words</span>
        <span class="stat-value" id="statKnown">0</span>
      </div>
      <div class="stats-section-title">Most checked words</div>
      <div id="topWords">
        <div class="stats-empty">No words checked yet</div>
      </div>
      <button class="stats-reset" id="statsResetBtn">Reset</button>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button id="prevBtn">← వెనుక</button>
    <div class="page-info">
      <span id="storyCounter" class="story-counter"></span>
      <span id="wordCount" class="word-count"></span>
    </div>
    <button id="nextBtn">తరువాత →</button>
  </div>

  <script src="stories.js"></script>
  <script type="module" src="./js/sync.js"></script>
  <script>
    // ── Daily Story Selection ────────────────────────────────────────────────

    function getDailyStoryIndex() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / 86400000);
      return dayOfYear % STORIES.length;
    }

    // ── Transliteration ──────────────────────────────────────────────────────

    const INDEPENDENT_VOWELS = {
      'అ': 'a',  'ఆ': 'ā',  'ఇ': 'i',  'ఈ': 'ī',  'ఉ': 'u',  'ఊ': 'ū',
      'ఋ': 'ru', 'ౠ': 'rū', 'ఎ': 'e',  'ఏ': 'ē',  'ఐ': 'ai',
      'ఒ': 'o',  'ఓ': 'ō',  'ఔ': 'au'
    };

    const MATRAS = {
      'ా': 'ā',  'ి': 'i',  'ీ': 'ī',  'ు': 'u',  'ూ': 'ū',
      'ృ': 'ru', '\u0C44': 'rū',
      'ె': 'e',  'ే': 'ē',  'ై': 'ai', 'ొ': 'o',  'ో': 'ō',  'ౌ': 'au'
    };

    const CONSONANTS = {
      'క': 'k',   'ఖ': 'kh',  'గ': 'g',   'ఘ': 'gh',  'ఙ': 'ṅ',
      'చ': 'c',   'ఛ': 'ch',  'జ': 'j',   'ఝ': 'jh',  'ఞ': 'ñ',
      'ట': 'ṭ',   'ఠ': 'ṭh', 'డ': 'ḍ',   'ఢ': 'ḍh', 'ణ': 'ṇ',
      'త': 't',   'థ': 'th',  'ద': 'd',   'ధ': 'dh',  'న': 'n',
      'ప': 'p',   'ఫ': 'ph',  'బ': 'b',   'భ': 'bh',  'మ': 'm',
      'య': 'y',   'ర': 'r',   'ల': 'l',   'వ': 'v',
      'శ': 'ś',   'ష': 'ṣ',   'స': 's',   'హ': 'h',
      'ళ': 'ḷ',   'ఱ': 'rr'
    };

    const VELAR_SET     = new Set(['\u0C15','\u0C16','\u0C17','\u0C18','\u0C19']);
    const PALATAL_SET   = new Set(['\u0C1A','\u0C1B','\u0C1C','\u0C1D','\u0C1E']);
    const RETROFLEX_SET = new Set(['\u0C1F','\u0C20','\u0C21','\u0C22','\u0C23','\u0C33','\u0C31']);
    const LABIAL_SET    = new Set(['\u0C2A','\u0C2B','\u0C2C','\u0C2D','\u0C2E']);

    const DIGITS = {
      '౦': '0', '౧': '1', '౨': '2', '౩': '3', '౪': '4',
      '౫': '5', '౬': '6', '౭': '7', '౮': '8', '౯': '9'
    };

    const VIRAMA   = '\u0C4D';
    const ANUSVARA = '\u0C02';
    const VISARGA  = '\u0C03';

    function transliterate(text) {
      let result = '';
      let i = 0;
      const n = text.length;

      while (i < n) {
        const ch = text[i];

        if (ch === 'క' && text[i + 1] === VIRAMA && text[i + 2] === 'ష') {
          i += 3;
          if (MATRAS[text[i]] !== undefined) {
            result += 'kṣ' + MATRAS[text[i++]];
          } else if (text[i] === VIRAMA) {
            result += 'kṣ'; i++;
          } else {
            result += 'kṣa';
          }
          continue;
        }

        if (CONSONANTS[ch] !== undefined) {
          const base = CONSONANTS[ch];
          i++;
          if (MATRAS[text[i]] !== undefined) {
            result += base + MATRAS[text[i++]];
          } else if (text[i] === VIRAMA) {
            result += base; i++;
          } else {
            result += base + 'a';
          }
        } else if (INDEPENDENT_VOWELS[ch] !== undefined) {
          result += INDEPENDENT_VOWELS[ch];
          i++;
        } else if (ch === ANUSVARA) {
          const next = text[i + 1];
          if      (next && RETROFLEX_SET.has(next)) result += 'ṇ';
          else if (next && PALATAL_SET.has(next))   result += 'ñ';
          else if (next && VELAR_SET.has(next))     result += 'ṅ';
          else if (next && LABIAL_SET.has(next))    result += 'm';
          else if (next && CONSONANTS[next] !== undefined) result += 'n';
          else                                      result += 'ṁ';
          i++;
        } else if (ch === VISARGA) {
          result += 'ḥ';
          i++;
        } else if (DIGITS[ch] !== undefined) {
          result += DIGITS[ch];
          i++;
        } else {
          result += ch;
          i++;
        }
      }

      return result;
    }

    // ── Progress Persistence ────────────────────────────────────────────────

    function getStoryProgress() {
      try {
        return JSON.parse(localStorage.getItem('storyProgress')) || {};
      } catch { return {}; }
    }

    function saveStoryProgress(storyIndex, pct) {
      const progress = getStoryProgress();
      const key = String(storyIndex);
      const existing = progress[key];
      const today = new Date().toISOString().slice(0, 10);

      if (!existing || pct > existing.bestPct) {
        progress[key] = { bestPct: pct, lastRead: today };
      } else {
        progress[key].lastRead = today;
      }
      localStorage.setItem('storyProgress', JSON.stringify(progress));
    }

    function recordReadingDate() {
      try {
        const dates = JSON.parse(localStorage.getItem('readingDates')) || [];
        const today = new Date().toISOString().slice(0, 10);
        if (dates[0] !== today) {
          dates.unshift(today);
          if (dates.length > 365) dates.length = 365;
          localStorage.setItem('readingDates', JSON.stringify(dates));
        }
      } catch {
        localStorage.setItem('readingDates', JSON.stringify([new Date().toISOString().slice(0, 10)]));
      }
    }

    // ── Reading Stats ────────────────────────────────────────────────────────

    let totalWords = 0;
    let totalClicks = 0;
    const clickedWords = new Map(); // word text -> click count

    function resetStats() {
      totalClicks = 0;
      clickedWords.clear();
      document.querySelectorAll('.word.was-clicked').forEach(w => w.classList.remove('was-clicked'));
      updateStatsUI();
    }

    function recordClick(wordText) {
      totalClicks++;
      clickedWords.set(wordText, (clickedWords.get(wordText) || 0) + 1);
      try {
        const cards = JSON.parse(localStorage.getItem('vocabCards') || '{}');
        if (!cards[wordText]) {
          const today = new Date().toISOString().slice(0, 10);
          cards[wordText] = {
            telugu: wordText,
            trans: transliterate(wordText),
            storyIdx: currentIndex,
            interval: 1,
            easeFactor: 2.5,
            nextReview: today,
            repetitions: 0,
            added: today
          };
          localStorage.setItem('vocabCards', JSON.stringify(cards));
        }
      } catch {}
      updateStatsUI();
    }

    function updateStatsUI() {
      const uniqueChecked = clickedWords.size;
      const known = totalWords - uniqueChecked;
      const pct = totalWords > 0 ? Math.round((known / totalWords) * 100) : 100;

      document.getElementById('statTotal').textContent = totalWords;
      document.getElementById('statChecked').textContent = uniqueChecked;
      document.getElementById('statClicks').textContent = totalClicks;
      document.getElementById('statKnown').textContent = known;
      document.getElementById('proficiencyPct').textContent = pct + '%';

      // Update ring — circumference = 2 * PI * 16 ≈ 100.53
      const circumference = 100.53;
      const offset = circumference - (pct / 100) * circumference;
      document.getElementById('proficiencyRing').setAttribute('stroke-dashoffset', offset);

      // Save progress (only if user has actually clicked words)
      if (totalClicks > 0) saveStoryProgress(currentIndex, pct);

      // Update ring color based on proficiency
      const ring = document.getElementById('proficiencyRing');
      ring.classList.remove('ring-high', 'ring-mid', 'ring-low');
      if (pct >= 80) ring.classList.add('ring-high');
      else if (pct >= 50) ring.classList.add('ring-mid');
      else ring.classList.add('ring-low');

      // Top clicked words (up to 5)
      const topWordsEl = document.getElementById('topWords');
      if (clickedWords.size === 0) {
        topWordsEl.innerHTML = '<div class="stats-empty">No words checked yet</div>';
        return;
      }

      const sorted = [...clickedWords.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      topWordsEl.innerHTML = sorted.map(([word, count]) =>
        `<div class="top-word">
          <span><span class="top-word-text">${word}</span><span class="top-word-phonetic">${transliterate(word)}</span></span>
          <span class="top-word-count">&times;${count}</span>
        </div>`
      ).join('');
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    let allRevealed = false;
    let currentIndex = getDailyStoryIndex();
    const dailyIndex = currentIndex;

    async function fetchMeaning(wordText) {
      const cards = JSON.parse(localStorage.getItem('vocabCards') || '{}');
      if (cards[wordText]?.meaning) return cards[wordText].meaning;

      try {
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(wordText)}&langpair=te|en`;
        const res = await fetch(url);
        const data = await res.json();
        const meaning = (data?.responseData?.translatedText || '').toLowerCase();
        if (meaning && cards[wordText]) {
          cards[wordText].meaning = meaning;
          localStorage.setItem('vocabCards', JSON.stringify(cards));
        }
        return meaning;
      } catch {
        return '';
      }
    }

    async function cycleWordState(span, wordText) {
      const ph = span.querySelector('.phonetic');
      const mn = span.querySelector('.meaning');
      const state = parseInt(span.dataset.clickState || '0');

      if (state === 0) {
        ph.classList.remove('hidden');
        mn.classList.add('hidden');
        span.classList.add('active');
        span.dataset.clickState = '1';
        recordClick(wordText);
        span.classList.add('was-clicked');
      } else if (state === 1) {
        ph.classList.add('hidden');
        mn.textContent = '…';
        mn.classList.remove('hidden');
        span.dataset.clickState = '2';
        const meaning = await fetchMeaning(wordText);
        mn.textContent = meaning || '—';
      } else {
        ph.classList.add('hidden');
        mn.classList.add('hidden');
        span.classList.remove('active');
        span.dataset.clickState = '0';
      }
    }

    function renderParagraph(text, container) {
      const tokens = text.match(/[\u0C00-\u0C7F]+|[^\u0C00-\u0C7F]+/g) || [];

      for (const token of tokens) {
        if (/[\u0C00-\u0C7F]/.test(token)) {
          const span = document.createElement('span');
          span.className = 'word';
          span.dataset.clickState = '0';
          span.addEventListener('click', () => cycleWordState(span, token));

          const label = document.createElement('span');
          label.className = 'phonetic hidden';
          label.textContent = transliterate(token);
          span.appendChild(label);

          const meaning = document.createElement('span');
          meaning.className = 'meaning hidden';
          span.appendChild(meaning);

          span.appendChild(document.createTextNode(token));
          container.appendChild(span);
        } else {
          container.appendChild(document.createTextNode(token));
        }
      }
    }

    function loadStory(index) {
      const story = STORIES[index];
      currentIndex = index;
      allRevealed = false;

      // Update headings
      document.getElementById('storyTitle').textContent = story.title;
      document.getElementById('storyTitleEn').textContent = story.titleEn;
      document.getElementById('storyCollection').textContent = story.collection;
      document.getElementById('dailyBadge').classList.toggle('hidden', index !== dailyIndex);

      // Clear and re-render story
      const storyEl = document.getElementById('story');
      storyEl.innerHTML = '';

      let wordCount = 0;
      for (const para of story.text.split('\n\n')) {
        const p = document.createElement('p');
        renderParagraph(para, p);
        storyEl.appendChild(p);
        const teluguWords = para.match(/[\u0C00-\u0C7F]+/g);
        if (teluguWords) wordCount += teluguWords.length;
      }

      // Update stats and record reading date
      totalWords = wordCount;
      resetStats();
      recordReadingDate();

      // Update bottom bar
      document.getElementById('wordCount').textContent = wordCount + ' పదాలు';
      document.getElementById('storyCounter').textContent = (index + 1) + ' / ' + STORIES.length;
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === STORIES.length - 1;

      // Scroll to top of page
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── Event Listeners ──────────────────────────────────────────────────────

    document.getElementById('toggleAllBtn').addEventListener('click', () => {
      allRevealed = !allRevealed;
      document.querySelectorAll('.word').forEach(w => {
        const ph = w.querySelector('.phonetic');
        const mn = w.querySelector('.meaning');
        if (allRevealed) {
          ph.classList.remove('hidden');
          mn.classList.add('hidden');
          w.classList.add('active');
          w.dataset.clickState = '1';
        } else {
          ph.classList.add('hidden');
          mn.classList.add('hidden');
          w.classList.remove('active');
          w.dataset.clickState = '0';
        }
      });
    });

    // Stats panel toggle
    document.getElementById('toggleStatsBtn').addEventListener('click', () => {
      document.getElementById('statsPanel').classList.toggle('visible');
    });

    document.getElementById('statsResetBtn').addEventListener('click', resetStats);

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentIndex > 0) loadStory(currentIndex - 1);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentIndex < STORIES.length - 1) loadStory(currentIndex + 1);
    });

    // ── Theme Toggle ──────────────────────────────────────────────────────

    function updateThemeIcon(theme) {
      const icon = document.getElementById('themeIcon');
      if (theme === 'dark') {
        icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      } else {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      }
    }

    document.getElementById('themeToggleBtn').addEventListener('click', () => {
      const current = document.documentElement.dataset.theme || 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    });

    updateThemeIcon(document.documentElement.dataset.theme || 'light');

    // ── Font Size Controls ─────────────────────────────────────────────────

    const FONT_MIN = 0.9;
    const FONT_MAX = 2.0;
    const FONT_STEP = 0.1;
    const FONT_DEFAULT = window.matchMedia('(max-width: 640px)').matches ? 1.5 : 1.25;

    function getStoredFontSize() {
      const stored = parseFloat(localStorage.getItem('storyFontSize'));
      return (stored >= FONT_MIN && stored <= FONT_MAX) ? stored : FONT_DEFAULT;
    }

    function applyFontSize(size) {
      document.documentElement.style.setProperty('--story-font-size', size + 'rem');
      localStorage.setItem('storyFontSize', size);
    }

    let currentFontSize = getStoredFontSize();
    applyFontSize(currentFontSize);

    document.getElementById('fontDecBtn').addEventListener('click', () => {
      currentFontSize = Math.max(FONT_MIN, +(currentFontSize - FONT_STEP).toFixed(2));
      applyFontSize(currentFontSize);
    });

    document.getElementById('fontIncBtn').addEventListener('click', () => {
      currentFontSize = Math.min(FONT_MAX, +(currentFontSize + FONT_STEP).toFixed(2));
      applyFontSize(currentFontSize);
    });

    // ── Story Progress Bar ──────────────────────────────────────────────────

    const progressBar = document.getElementById('progressBar');

    function updateProgress() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? Math.min(100, (scrollTop / docHeight) * 100) : 0;
      progressBar.style.width = progress + '%';
    }

    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress, { passive: true });

    // ── Init ─────────────────────────────────────────────────────────────────

    const urlParams = new URLSearchParams(window.location.search);
    const storyParam = urlParams.get('story');
    if (storyParam !== null) {
      const idx = parseInt(storyParam, 10);
      if (idx >= 0 && idx < STORIES.length) currentIndex = idx;
    }

    loadStory(currentIndex);
    updateProgress();

    // ── Flashcard due count ───────────────────────────────────────────────────

    (function () {
      try {
        const cards = JSON.parse(localStorage.getItem('vocabCards') || '{}');
        const today = new Date().toISOString().slice(0, 10);
        const due = Object.values(cards).filter(c => c.nextReview <= today).length;
        if (due > 0) {
          const badge = document.getElementById('navFlashcardBadge');
          badge.textContent = due;
          badge.style.display = '';
        }
      } catch {}
    })();
  </script>
</body>
